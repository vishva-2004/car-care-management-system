<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password — Car Care</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Car <span>Care</span></h1>
            <p>Reset your password</p>
        </div>
        <div id="alertBox"></div>

        <!-- Step 1: Enter username -->
        <div id="step1">
            <p style="font-size:13px;color:#a06060;margin-bottom:20px;text-align:center;line-height:1.6;">
                Enter your username below. A temporary password will be generated for you to login.
            </p>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="usernameInput" placeholder="Enter your username">
            </div>
            <button class="btn btn-primary" id="resetBtn" onclick="doReset()">Generate Temporary Password</button>
        </div>

        <!-- Step 2: Show temp password -->
        <div id="step2" style="display:none;">
            <div style="background:#d5f5e3;border:1px solid #a9dfbf;border-radius:8px;padding:20px;text-align:center;margin-bottom:20px;">
                <p style="font-size:12px;color:#1e8449;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Your Temporary Password</p>
                <p id="tempPwdDisplay" style="font-size:26px;font-weight:800;color:#1e8449;letter-spacing:4px;font-family:monospace;"></p>
            </div>
            <div class="alert alert-warning">
                ⚠️ This password is shown only once. Please copy it, login immediately, and change your password from your account settings.
            </div>
            <button class="btn btn-primary" onclick="window.location.href='/login'">Go to Login →</button>
        </div>

        <div class="auth-footer">
            <a href="/login">← Back to Login</a>
        </div>
    </div>
</div>
<script>
async function doReset() {
    const username = document.getElementById('usernameInput').value.trim();
    const alertBox = document.getElementById('alertBox');
    const btn      = document.getElementById('resetBtn');

    alertBox.innerHTML = '';
    if (!username) {
        alertBox.innerHTML = '<div class="alert alert-error">Please enter your username.</div>';
        return;
    }

    btn.textContent = 'Generating...';
    btn.disabled = true;

    try {
        const res  = await fetch('/auth/forgot-password', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username })
        });
        const data = await res.json();

        if (res.ok && data.found) {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('tempPwdDisplay').textContent = data.tempPassword;
            document.getElementById('step2').style.display = 'block';
        } else if (res.ok && !data.found) {
            alertBox.innerHTML = '<div class="alert alert-warning">⚠️ Username not found. Please check and try again, or contact your manager.</div>';
            btn.textContent = 'Generate Temporary Password';
            btn.disabled = false;
        } else {
            alertBox.innerHTML = '<div class="alert alert-error">Something went wrong. Please try again.</div>';
            btn.textContent = 'Generate Temporary Password';
            btn.disabled = false;
        }
    } catch(e) {
        alertBox.innerHTML = '<div class="alert alert-error">Connection error. Is the server running?</div>';
        btn.textContent = 'Generate Temporary Password';
        btn.disabled = false;
    }
}
document.addEventListener('keypress', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
