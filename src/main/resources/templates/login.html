<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Car Care</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Car <span>Care</span></h1>
            <p>Automobile Management System</p>
        </div>
        <div id="alertBox"></div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Login</button>
        <div class="auth-footer">
            <a href="/forgot-password" style="color:#c0392b;text-decoration:none;font-weight:600;">Forgot Password?</a>
        </div>
        <div class="auth-footer">
            New here? <a href="/register">Register an account</a>
        </div>
        <div class="auth-footer">
            <a href="/home" style="color:#a06060;font-size:12px;">← Browse vehicles without login</a>
        </div>
    </div>
</div>
<script>
async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const alertBox = document.getElementById('alertBox');
    const btn      = document.getElementById('loginBtn');

    alertBox.innerHTML = '';
    if (!username || !password) {
        alertBox.innerHTML = '<div class="alert alert-error">Please enter username and password.</div>';
        return;
    }

    btn.textContent = 'Logging in...';
    btn.disabled = true;

    try {
        const res  = await fetch('/auth/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, password })
        });

        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch(e) { data = text; }

        if (res.ok && typeof data === 'object' && data.token) {
            localStorage.setItem('jwtToken',  data.token);
            localStorage.setItem('username',  data.username);
            localStorage.setItem('role',      data.role);
            window.location.href = data.role === 'CUSTOMER' ? '/customer-dashboard' : '/dashboard';
        } else {
            const msg = (typeof data === 'object' ? data.message || JSON.stringify(data) : data) || 'Login failed.';
            alertBox.innerHTML = `<div class="alert alert-error">${msg}</div>`;
            btn.textContent = 'Login';
            btn.disabled = false;
        }
    } catch(e) {
        alertBox.innerHTML = '<div class="alert alert-error">Connection error. Is the server running?</div>';
        btn.textContent = 'Login';
        btn.disabled = false;
    }
}
document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
